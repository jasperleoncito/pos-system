name: pos-system

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-pos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-pos}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pos} -d ${DB_NAME:-pos}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [pos-network]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [pos-network]

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    volumes:
      - minio-data:/data
    ports:
      - "9673:9001" # web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [pos-network]

  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-pos}
    entrypoint: ["/bin/sh", "/init.sh"]
    volumes:
      - ./deploy/minio/init.sh:/init.sh:ro
    networks: [pos-network]

  backend:
    build:
      context: ./backend
      target: dev
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_ADDR: redis:6379
      MINIO_ENDPOINT: minio:9000
      SMTP_HOST: mailpit
    volumes:
      - ./backend:/app
      - backend-go-cache:/go-cache
      - backend-gomod-cache:/gomod-cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks: [pos-network]

  worker:
    build:
      context: ./backend
      target: dev
    command: ["go", "run", "./cmd/worker"]
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_ADDR: redis:6379
      MINIO_ENDPOINT: minio:9000
      SMTP_HOST: mailpit
    volumes:
      - ./backend:/app
      - backend-go-cache:/go-cache
      - backend-gomod-cache:/gomod-cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [pos-network]

  # Production-built frontend by default: instant navigation. For
  # frontend hot reload while editing UI code, use the override:
  #   docker compose -f docker-compose.yml -f docker-compose.frontend-dev.yml up -d --build frontend
  frontend:
    build:
      context: ./frontend
      target: prod
    environment:
      NEXT_PUBLIC_API_URL: /api/v1
    networks: [pos-network]

  mailpit:
    image: axllent/mailpit:v1.21
    ports:
      - "9284:8025" # web UI
    networks: [pos-network]

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "7642:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks: [pos-network]

volumes:
  postgres-data:
  redis-data:
  minio-data:
  backend-go-cache:
  backend-gomod-cache:

networks:
  pos-network:
    driver: bridge
