<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1080px; }
  body {
    font-family: "Inter", system-ui, sans-serif; color: #fff;
    background:
      radial-gradient(120% 120% at 0% 0%, rgba(245,158,11,.5) 0%, transparent 55%),
      radial-gradient(120% 120% at 100% 100%, rgba(185,28,28,.6) 0%, transparent 50%),
      linear-gradient(135deg, #EA580C 0%, #DC2626 100%);
    position: relative; overflow: hidden;
  }
  .grain { position: absolute; inset: 0; opacity: .5;
    background-image: radial-gradient(rgba(255,255,255,.14) 1.5px, transparent 1.5px); background-size: 30px 30px; }
  .frame { position: relative; height: 100%; padding: 76px 80px; display: flex; flex-direction: column; align-items: center; text-align: center; }
  .brand { display: flex; align-items: center; gap: 16px; }
  .logo { width: 64px; height: 64px; border-radius: 18px; background: rgba(255,255,255,.16); display: flex; align-items: center; justify-content: center; backdrop-filter: blur(6px); }
  .logo svg { width: 36px; height: 36px; stroke: #fff; }
  .wordmark { font-size: 30px; font-weight: 600; }
  .center { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  h1 { font-family: "Fraunces", serif; font-weight: 600; font-size: 84px; line-height: 1.03; letter-spacing: -.02em; }
  .price { display: flex; align-items: baseline; gap: 14px; margin: 40px 0 10px; }
  .amt { font-family: "Fraunces", serif; font-size: 150px; font-weight: 700; letter-spacing: -.03em; }
  .per { font-size: 40px; font-weight: 600; color: rgba(255,255,255,.85); }
  .note { font-size: 28px; color: rgba(255,255,255,.85); }
  .cta { margin-top: 46px; background: #fff; color: #DC2626; font-size: 34px; font-weight: 800;
    padding: 24px 56px; border-radius: 999px; box-shadow: 0 24px 50px -20px rgba(0,0,0,.4); }
  .foot { display: flex; align-items: center; gap: 14px; font-size: 28px; font-weight: 600; }
  .foot svg { width: 30px; height: 30px; fill: #fff; }
</style>
</head>
<body>
  <div class="grain"></div>
  <div class="frame">
    <div class="brand">
      <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z"/><line x1="6" y1="17" x2="18" y2="17"/></svg></div>
      <span class="wordmark">POS System</span>
    </div>
    <div class="center">
      <h1>Every feature.<br>One simple price.</h1>
      <div class="price"><span class="amt">₱800</span><span class="per">/ month</span></div>
      <div class="note">or ₱8,000 / year — 2 months free. No hardware, no hidden fees.</div>
      <div class="cta">Get started today →</div>
    </div>
    <div class="foot">
      <svg viewBox="0 0 24 24"><path d="M24 12.07C24 5.4 18.63 0 12 0S0 5.4 0 12.07C0 18.1 4.39 23.1 10.13 24v-8.44H7.08v-3.49h3.05V9.41c0-3.02 1.79-4.69 4.53-4.69 1.31 0 2.68.24 2.68.24v2.97h-1.51c-1.49 0-1.96.93-1.96 1.89v2.25h3.33l-.53 3.49h-2.8V24C19.61 23.1 24 18.1 24 12.07Z"/></svg>
      facebook.com/webdevbot
    </div>
  </div>
</body>
</html>
