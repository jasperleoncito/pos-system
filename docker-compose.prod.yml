# Production stack: built images (no bind mounts, no hot reload),
# healthchecks, restart policies. Serves plain HTTP on WEB_PORT — put
# your own reverse proxy (e.g. Nginx Proxy Manager) in front for the
# domain + TLS and point it at this port.
#
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml exec backend /app/seed   # optional demo data
name: pos-system-prod

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-pos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-pos}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pos} -d ${DB_NAME:-pos}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [pos-network]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [pos-network]

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [pos-network]

  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-pos}
    entrypoint: ["/bin/sh", "/init.sh"]
    volumes:
      - ./deploy/minio/init.sh:/init.sh:ro
    networks: [pos-network]

  backend:
    build:
      context: ./backend
      target: prod
    env_file: .env
    environment:
      APP_ENV: production
      DB_HOST: postgres
      REDIS_ADDR: redis:6379
      MINIO_ENDPOINT: minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks: [pos-network]

  worker:
    build:
      context: ./backend
      target: prod
    command: ["/app/worker"]
    env_file: .env
    environment:
      APP_ENV: production
      DB_HOST: postgres
      REDIS_ADDR: redis:6379
      MINIO_ENDPOINT: minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [pos-network]

  frontend:
    build:
      context: ./frontend
      target: prod
    environment:
      NEXT_PUBLIC_API_URL: /api/v1
    restart: unless-stopped
    networks: [pos-network]

  # Internal router: one origin for /api (Go), /storage (MinIO), and the
  # Next.js app, with SSE buffering off and the 12MB upload cap. Your
  # external reverse proxy terminates TLS and forwards to WEB_PORT.
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${WEB_PORT:-7642}:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks: [pos-network]

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  pos-network:
    driver: bridge
