# The one and only stack file — works locally and on a VPS.
#
#   docker compose up -d --build          # start / update everything
#   docker compose exec backend /app/seed # demo data (idempotent)
#
# Everything is production-built (fast, small, stable). After editing
# code, rebuild just that service:
#   docker compose up -d --build backend   (or frontend / worker)
#
# The nginx service is the app's single entrypoint on WEB_PORT (default
# 7642): it routes /api -> Go, /storage -> MinIO, everything else ->
# Next.js. On a VPS, point your reverse proxy (e.g. Nginx Proxy
# Manager) at this port for the domain + TLS.
name: pos-system

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-pos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-pos}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pos} -d ${DB_NAME:-pos}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [pos-network]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [pos-network]

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    volumes:
      - minio-data:/data
    ports:
      - "9673:9001" # web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [pos-network]

  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-pos}
    entrypoint: ["/bin/sh", "/init.sh"]
    volumes:
      - ./deploy/minio/init.sh:/init.sh:ro
    networks: [pos-network]

  backend:
    build:
      context: ./backend
      target: prod
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_ADDR: redis:6379
      MINIO_ENDPOINT: minio:9000
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      # First-boot auto-seed: admin = super admin only (uses
      # SEED_PASSWORD), demo = full demo tenant, off = nothing.
      SEED_ON_START: ${SEED_ON_START:-admin}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks: [pos-network]

  worker:
    build:
      context: ./backend
      target: prod
    command: ["/app/worker"]
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_ADDR: redis:6379
      MINIO_ENDPOINT: minio:9000
      SMTP_HOST: ${SMTP_HOST:-mailpit}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [pos-network]

  frontend:
    build:
      context: ./frontend
      target: prod
    environment:
      NEXT_PUBLIC_API_URL: /api/v1
    restart: unless-stopped
    networks: [pos-network]

  mailpit:
    image: axllent/mailpit:v1.21
    ports:
      - "9284:8025" # web UI
    restart: unless-stopped
    networks: [pos-network]

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${WEB_PORT:-7642}:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks: [pos-network]

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  pos-network:
    driver: bridge
