basePath: /api/v1
definitions:
  dto.ForgotPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.LogoutRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  dto.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  dto.RegisterRequest:
    properties:
      business_name:
        maxLength: 120
        minLength: 2
        type: string
      business_slug:
        maxLength: 60
        minLength: 2
        type: string
      email:
        type: string
      full_name:
        maxLength: 120
        minLength: 2
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
    required:
    - business_name
    - business_slug
    - email
    - full_name
    - password
    type: object
  dto.ResetPasswordRequest:
    properties:
      new_password:
        maxLength: 72
        minLength: 8
        type: string
      token:
        type: string
    required:
    - new_password
    - token
    type: object
  dto.SetTenantStatusRequest:
    properties:
      status:
        enum:
        - active
        - suspended
        type: string
    required:
    - status
    type: object
  dto.SwitchTenantRequest:
    properties:
      tenant_id:
        type: string
    required:
    - tenant_id
    type: object
  dto.UpdateTenantSettingsRequest:
    properties:
      accent_color:
        type: string
      address:
        maxLength: 400
        type: string
      contact_number:
        maxLength: 40
        type: string
      facebook:
        maxLength: 200
        type: string
      primary_color:
        type: string
      receipt_footer:
        maxLength: 500
        type: string
      receipt_header:
        maxLength: 500
        type: string
      secondary_color:
        type: string
      tax_id:
        maxLength: 60
        type: string
      tax_label:
        maxLength: 60
        type: string
      website:
        maxLength: 200
        type: string
    required:
    - accent_color
    - primary_color
    - secondary_color
    type: object
  dto.VerifyEmailRequest:
    properties:
      token:
        type: string
    required:
    - token
    type: object
  response.Envelope:
    properties:
      data: {}
      message:
        type: string
      meta:
        $ref: '#/definitions/response.Meta'
      success:
        type: boolean
    type: object
  response.ErrorEnvelope:
    properties:
      errors:
        items:
          type: string
        type: array
      message:
        type: string
      success:
        type: boolean
    type: object
  response.Meta:
    properties:
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
info:
  contact: {}
  description: Multi-Tenant Restaurant POS & Business Management System API
  title: POS System API
  version: "1.0"
paths:
  /admin/tenants:
    get:
      parameters:
      - description: Page (1-based)
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: List all tenants (super admin)
      tags:
      - admin
  /admin/tenants/{id}/status:
    patch:
      consumes:
      - application/json
      parameters:
      - description: Tenant ID
        in: path
        name: id
        required: true
        type: string
      - description: New status
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.SetTenantStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Activate or suspend a tenant (super admin)
      tags:
      - admin
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      parameters:
      - description: Email
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      summary: Request a password reset email
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Credentials
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Login with email and password
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.LogoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      summary: Logout the current device session
      tags:
      - auth
  /auth/logout-all:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Logout from every device
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Rotate the refresh token and get a new access token
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Registration payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Envelope'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Register an owner account with their first business
      tags:
      - auth
  /auth/resend-verification:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Resend the verification email
      tags:
      - auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      parameters:
      - description: Token and new password
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Reset password using an emailed token
      tags:
      - auth
  /auth/sessions:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: List active device sessions
      tags:
      - auth
  /auth/sessions/{id}:
    delete:
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Revoke one of your device sessions
      tags:
      - auth
  /auth/switch-tenant:
    post:
      consumes:
      - application/json
      parameters:
      - description: Target tenant
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.SwitchTenantRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Switch the active business
      tags:
      - auth
  /auth/verify-email:
    post:
      consumes:
      - application/json
      parameters:
      - description: Verification token
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.VerifyEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Verify email using an emailed token
      tags:
      - auth
  /health:
    get:
      description: Reports API liveness and dependency status (PostgreSQL, Redis,
        MinIO)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/response.Envelope'
      summary: Health check
      tags:
      - system
  /tenant/logo:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: PNG/JPG/WEBP, max 10MB
        in: formData
        name: logo
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Upload the business logo (optimized to WebP automatically)
      tags:
      - tenant
  /tenant/settings:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Get the active business's branding settings
      tags:
      - tenant
    put:
      consumes:
      - application/json
      parameters:
      - description: Branding fields
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateTenantSettingsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Update branding settings
      tags:
      - tenant
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
