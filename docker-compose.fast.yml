# Fast-frontend override: runs ONLY the frontend as a production build
# (precompiled pages + link prefetching = instant navigation) while the
# backend keeps air hot-reload. Use this when you're USING the app, not
# editing frontend code (frontend changes need a rebuild in this mode).
#
#   make frontend-fast   # switch to the fast production frontend
#   make frontend-dev    # switch back to hot-reload frontend
services:
  frontend:
    build:
      context: ./frontend
      target: prod
    volumes: !reset []
