events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    client_max_body_size 12m; # logo/product uploads are capped at 10MB + overhead

    upstream frontend {
        server frontend:4519;
    }

    upstream backend {
        server backend:9137;
    }

    upstream minio {
        server minio:9000;
    }

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # API → Go backend
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Kitchen display SSE stream — buffering must be off for realtime events
        location /api/v1/kitchen/stream {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 24h;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Optimized images → MinIO (bucket name is the first path segment)
        location /storage/ {
            rewrite ^/storage/(.*)$ /pos/$1 break;
            proxy_pass http://minio;
            proxy_set_header Host $host;
        }

        # Everything else → Next.js (incl. HMR websocket in dev)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
