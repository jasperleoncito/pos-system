<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1080px; }
  body {
    font-family: "Inter", system-ui, sans-serif; color: #2A1410;
    background: radial-gradient(90% 70% at 0% 0%, rgba(220,38,38,.1) 0%, transparent 60%), #FDF8F1;
    position: relative; overflow: hidden;
  }
  .frame { position: relative; height: 100%; padding: 76px 80px; display: flex; flex-direction: column; }
  .brand { display: flex; align-items: center; gap: 16px; }
  .logo { width: 60px; height: 60px; border-radius: 18px; background: #DC2626; display: flex; align-items: center; justify-content: center; }
  .logo svg { width: 34px; height: 34px; stroke: #fff; }
  .wordmark { font-size: 28px; font-weight: 600; }
  .kicker { display: inline-flex; align-self: flex-start; margin-top: 54px; background: #FCE9D6; color: #B45309;
    padding: 10px 20px; border-radius: 999px; font-size: 22px; font-weight: 600; }
  h1 { font-family: "Fraunces", serif; font-weight: 600; font-size: 92px; line-height: 1; letter-spacing: -.02em; margin-top: 26px; }
  h1 span { color: #DC2626; }
  .sub { font-size: 32px; line-height: 1.4; color: #7A6A62; margin-top: 26px; max-width: 640px; }
  .stage { flex: 1; display: flex; align-items: center; gap: 20px; }
  .col { flex: 1; }
  .colh { font-size: 22px; font-weight: 700; color: #7A6A62; margin-bottom: 14px; text-transform: uppercase; letter-spacing: .04em; }
  .ticket { background: #fff; border: 1px solid #EFE3D6; border-radius: 18px; padding: 20px; margin-bottom: 14px;
    box-shadow: 0 16px 34px -24px rgba(120,40,10,.4); }
  .th { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .tno { font-size: 24px; font-weight: 800; }
  .time { font-size: 18px; font-weight: 700; padding: 4px 12px; border-radius: 999px; }
  .amber { background: #FEF3C7; color: #B45309; }
  .red { background: #FEE2E2; color: #B91C1C; }
  .green { background: #DCFCE7; color: #15803D; }
  .li { font-size: 20px; color: #4a3a33; padding: 5px 0; }
  .li b { color: #2A1410; }
</style>
</head>
<body>
  <div class="frame">
    <div class="brand">
      <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z"/><line x1="6" y1="17" x2="18" y2="17"/></svg></div>
      <span class="wordmark">POS System</span>
    </div>
    <span class="kicker">③ Kitchen Display</span>
    <h1>Orders fly straight<br>to the <span>kitchen.</span></h1>
    <p class="sub">Live tickets the moment a cashier hits pay. No more paper, no more shouting.</p>
    <div class="stage">
      <div class="col">
        <div class="colh">New</div>
        <div class="ticket"><div class="th"><span class="tno">#118</span><span class="time amber">2m</span></div><div class="li"><b>2×</b> Pork Sisig</div><div class="li"><b>2×</b> Garlic Rice</div></div>
      </div>
      <div class="col">
        <div class="colh">Preparing</div>
        <div class="ticket"><div class="th"><span class="tno">#117</span><span class="time red">11m</span></div><div class="li"><b>1×</b> Beef Tapa</div><div class="li"><b>1×</b> Egg</div></div>
      </div>
      <div class="col">
        <div class="colh">Ready</div>
        <div class="ticket"><div class="th"><span class="tno">#116</span><span class="time green">✓</span></div><div class="li"><b>3×</b> Chicken Adobo</div><div class="li"><b>3×</b> Rice</div></div>
      </div>
    </div>
  </div>
</body>
</html>
