<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1080px; }
  body {
    font-family: "Inter", system-ui, sans-serif;
    color: #fff;
    background:
      radial-gradient(120% 120% at 100% 0%, rgba(245,158,11,.55) 0%, transparent 55%),
      radial-gradient(120% 120% at 0% 100%, rgba(185,28,28,.65) 0%, transparent 50%),
      linear-gradient(135deg, #DC2626 0%, #EA580C 55%, #D97706 100%);
    position: relative;
    overflow: hidden;
  }
  .grain { position: absolute; inset: 0; opacity: .5;
    background-image: radial-gradient(rgba(255,255,255,.14) 1.5px, transparent 1.5px);
    background-size: 30px 30px; }
  .frame { position: relative; height: 100%; padding: 76px 80px; display: flex; flex-direction: column; }
  .brand { display: flex; align-items: center; gap: 16px; }
  .logo { width: 68px; height: 68px; border-radius: 20px; background: rgba(255,255,255,.16);
    display: flex; align-items: center; justify-content: center; backdrop-filter: blur(6px); }
  .logo svg { width: 38px; height: 38px; stroke: #fff; }
  .wordmark { font-size: 30px; font-weight: 600; letter-spacing: -.01em; }
  .center { flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .kicker { display: inline-flex; align-items: center; gap: 10px; align-self: flex-start;
    background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.25);
    padding: 10px 20px; border-radius: 999px; font-size: 22px; font-weight: 500; backdrop-filter: blur(6px); }
  .dot { width: 10px; height: 10px; border-radius: 999px; background: #fff; }
  h1 { font-family: "Fraunces", serif; font-weight: 600; font-size: 118px; line-height: .98;
    letter-spacing: -.02em; margin-top: 30px; }
  h1 em { font-style: italic; }
  .sub { font-size: 34px; line-height: 1.4; color: rgba(255,255,255,.9); margin-top: 34px; max-width: 760px; }
  .foot { display: flex; align-items: center; justify-content: space-between; }
  .handle { font-size: 26px; font-weight: 600; }
  .badges { display: flex; gap: 14px; }
  .badge { background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.22);
    padding: 12px 22px; border-radius: 999px; font-size: 24px; font-weight: 500; }
</style>
</head>
<body>
  <div class="grain"></div>
  <div class="frame">
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z"/><line x1="6" y1="17" x2="18" y2="17"/></svg>
      </div>
      <span class="wordmark">POS System</span>
    </div>

    <div class="center">
      <span class="kicker"><span class="dot"></span> Now live for Filipino restaurants</span>
      <h1>Run your eatery,<br><em>the modern way.</em></h1>
      <p class="sub">One app for point of sale, kitchen display, inventory, staff, loyalty, and analytics — for every business you own.</p>
    </div>

    <div class="foot">
      <span class="handle">fb.com/webdevbot</span>
      <div class="badges"><span class="badge">₱ ready</span><span class="badge">GCash &amp; Maya</span></div>
    </div>
  </div>
</body>
</html>
