basePath: /api/v1
definitions:
  dto.CategoryRequest:
    properties:
      description:
        maxLength: 500
        type: string
      is_active:
        type: boolean
      name:
        maxLength: 120
        minLength: 1
        type: string
      sort_order:
        minimum: 0
        type: integer
    required:
    - name
    type: object
  dto.CloseDrawerRequest:
    properties:
      counted_cash:
        minimum: 0
        type: integer
    type: object
  dto.CouponRequest:
    properties:
      amount_value:
        minimum: 0
        type: integer
      code:
        maxLength: 40
        minLength: 2
        type: string
      discount_type:
        enum:
        - percent
        - fixed
        type: string
      is_active:
        type: boolean
      max_uses:
        minimum: 0
        type: integer
      min_order_amount:
        minimum: 0
        type: integer
      percent_value:
        maximum: 100
        minimum: 0
        type: number
      valid_from:
        type: string
      valid_to:
        type: string
    required:
    - code
    - discount_type
    type: object
  dto.CreateOrderRequest:
    properties:
      coupon_code:
        maxLength: 40
        type: string
      discount_id:
        type: string
      hold:
        type: boolean
      items:
        items:
          $ref: '#/definitions/dto.OrderItemRequest'
        minItems: 1
        type: array
      notes:
        maxLength: 500
        type: string
      order_type:
        enum:
        - dine_in
        - takeout
        - delivery
        type: string
      table_number:
        maxLength: 20
        type: string
    required:
    - items
    - order_type
    type: object
  dto.CreateSplitsRequest:
    properties:
      amounts:
        items:
          type: integer
        minItems: 2
        type: array
    required:
    - amounts
    type: object
  dto.DiscountRequest:
    properties:
      amount_value:
        minimum: 0
        type: integer
      is_active:
        type: boolean
      name:
        maxLength: 120
        minLength: 1
        type: string
      percent_value:
        maximum: 100
        minimum: 0
        type: number
      requires_approval:
        type: boolean
      type:
        enum:
        - percent
        - fixed
        type: string
    required:
    - name
    - type
    type: object
  dto.ForgotPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  dto.HoldOrderRequest:
    properties:
      hold:
        type: boolean
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.LogoutRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  dto.ModifierGroupRequest:
    properties:
      is_required:
        type: boolean
      max_select:
        minimum: 1
        type: integer
      min_select:
        minimum: 0
        type: integer
      modifiers:
        items:
          $ref: '#/definitions/dto.ModifierInput'
        type: array
      name:
        maxLength: 120
        minLength: 1
        type: string
      sort_order:
        minimum: 0
        type: integer
    required:
    - name
    type: object
  dto.ModifierInput:
    properties:
      is_active:
        type: boolean
      name:
        maxLength: 120
        minLength: 1
        type: string
      price_delta:
        type: integer
    required:
    - name
    type: object
  dto.OpenDrawerRequest:
    properties:
      opening_float:
        minimum: 0
        type: integer
    type: object
  dto.OrderItemRequest:
    properties:
      modifier_ids:
        items:
          type: string
        type: array
      notes:
        maxLength: 300
        type: string
      product_id:
        type: string
      qty:
        maximum: 999
        minimum: 1
        type: integer
      variant_id:
        type: string
    required:
    - product_id
    - qty
    type: object
  dto.PayOrderRequest:
    properties:
      payments:
        items:
          $ref: '#/definitions/dto.PaymentLineRequest'
        minItems: 1
        type: array
    required:
    - payments
    type: object
  dto.PaymentLineRequest:
    properties:
      amount:
        minimum: 1
        type: integer
      method:
        enum:
        - cash
        - gcash
        - card
        - maya
        - bank_transfer
        type: string
      reference_no:
        maxLength: 100
        type: string
    required:
    - amount
    - method
    type: object
  dto.ProductRequest:
    properties:
      base_price:
        minimum: 0
        type: integer
      category_id:
        type: string
      cost_price:
        minimum: 0
        type: integer
      description:
        maxLength: 1000
        type: string
      is_active:
        type: boolean
      modifier_groups:
        items:
          type: string
        type: array
      name:
        maxLength: 160
        minLength: 1
        type: string
      sku:
        maxLength: 60
        type: string
      sort_order:
        minimum: 0
        type: integer
      tax_id:
        type: string
      track_inventory:
        type: boolean
      variants:
        items:
          $ref: '#/definitions/dto.VariantInput'
        type: array
    required:
    - category_id
    - name
    type: object
  dto.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  dto.RefundItemRequest:
    properties:
      order_item_id:
        type: string
      qty:
        minimum: 1
        type: integer
    required:
    - order_item_id
    - qty
    type: object
  dto.RefundRequest:
    properties:
      amount:
        minimum: 0
        type: integer
      items:
        items:
          $ref: '#/definitions/dto.RefundItemRequest'
        type: array
      reason:
        maxLength: 300
        minLength: 3
        type: string
    required:
    - reason
    type: object
  dto.RegisterRequest:
    properties:
      business_name:
        maxLength: 120
        minLength: 2
        type: string
      business_slug:
        maxLength: 60
        minLength: 2
        type: string
      email:
        type: string
      full_name:
        maxLength: 120
        minLength: 2
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
    required:
    - business_name
    - business_slug
    - email
    - full_name
    - password
    type: object
  dto.ResetPasswordRequest:
    properties:
      new_password:
        maxLength: 72
        minLength: 8
        type: string
      token:
        type: string
    required:
    - new_password
    - token
    type: object
  dto.SetTenantStatusRequest:
    properties:
      status:
        enum:
        - active
        - suspended
        type: string
    required:
    - status
    type: object
  dto.SwitchTenantRequest:
    properties:
      tenant_id:
        type: string
    required:
    - tenant_id
    type: object
  dto.TaxRequest:
    properties:
      is_active:
        type: boolean
      is_default:
        type: boolean
      is_inclusive:
        type: boolean
      name:
        maxLength: 120
        minLength: 1
        type: string
      rate_percent:
        maximum: 100
        minimum: 0
        type: number
    required:
    - name
    type: object
  dto.UpdateTenantSettingsRequest:
    properties:
      accent_color:
        type: string
      address:
        maxLength: 400
        type: string
      contact_number:
        maxLength: 40
        type: string
      facebook:
        maxLength: 200
        type: string
      primary_color:
        type: string
      receipt_footer:
        maxLength: 500
        type: string
      receipt_header:
        maxLength: 500
        type: string
      secondary_color:
        type: string
      tax_id:
        maxLength: 60
        type: string
      tax_label:
        maxLength: 60
        type: string
      website:
        maxLength: 200
        type: string
    required:
    - accent_color
    - primary_color
    - secondary_color
    type: object
  dto.ValidateCouponRequest:
    properties:
      code:
        type: string
      subtotal:
        minimum: 1
        type: integer
    required:
    - code
    - subtotal
    type: object
  dto.VariantInput:
    properties:
      name:
        maxLength: 120
        minLength: 1
        type: string
      price_delta:
        type: integer
      sku:
        maxLength: 60
        type: string
    required:
    - name
    type: object
  dto.VerifyEmailRequest:
    properties:
      token:
        type: string
    required:
    - token
    type: object
  dto.VoidRequest:
    properties:
      reason:
        maxLength: 300
        minLength: 3
        type: string
    required:
    - reason
    type: object
  response.Envelope:
    properties:
      data: {}
      message:
        type: string
      meta:
        $ref: '#/definitions/response.Meta'
      success:
        type: boolean
    type: object
  response.ErrorEnvelope:
    properties:
      errors:
        items:
          type: string
        type: array
      message:
        type: string
      success:
        type: boolean
    type: object
  response.Meta:
    properties:
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
info:
  contact: {}
  description: Multi-Tenant Restaurant POS & Business Management System API
  title: POS System API
  version: "1.0"
paths:
  /admin/tenants:
    get:
      parameters:
      - description: Page (1-based)
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: List all tenants (super admin)
      tags:
      - admin
  /admin/tenants/{id}/status:
    patch:
      consumes:
      - application/json
      parameters:
      - description: Tenant ID
        in: path
        name: id
        required: true
        type: string
      - description: New status
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.SetTenantStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Activate or suspend a tenant (super admin)
      tags:
      - admin
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      parameters:
      - description: Email
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      summary: Request a password reset email
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Credentials
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Login with email and password
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.LogoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      summary: Logout the current device session
      tags:
      - auth
  /auth/logout-all:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Logout from every device
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Rotate the refresh token and get a new access token
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Registration payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Envelope'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Register an owner account with their first business
      tags:
      - auth
  /auth/resend-verification:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Resend the verification email
      tags:
      - auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      parameters:
      - description: Token and new password
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Reset password using an emailed token
      tags:
      - auth
  /auth/sessions:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: List active device sessions
      tags:
      - auth
  /auth/sessions/{id}:
    delete:
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Revoke one of your device sessions
      tags:
      - auth
  /auth/switch-tenant:
    post:
      consumes:
      - application/json
      parameters:
      - description: Target tenant
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.SwitchTenantRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Switch the active business
      tags:
      - auth
  /auth/verify-email:
    post:
      consumes:
      - application/json
      parameters:
      - description: Verification token
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.VerifyEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Verify email using an emailed token
      tags:
      - auth
  /cash-drawer/close:
    post:
      consumes:
      - application/json
      parameters:
      - description: Counted cash (centavos)
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.CloseDrawerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Close the drawer with counted cash (variance computed)
      tags:
      - cash-drawer
  /cash-drawer/current:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Get the open drawer session with its movements
      tags:
      - cash-drawer
  /cash-drawer/open:
    post:
      consumes:
      - application/json
      parameters:
      - description: Opening float (centavos)
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.OpenDrawerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Envelope'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Open the cash drawer with an opening float
      tags:
      - cash-drawer
  /categories:
    get:
      parameters:
      - description: Only active categories
        in: query
        name: active
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: List menu categories
      tags:
      - catalog
    post:
      consumes:
      - application/json
      parameters:
      - description: Category
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.CategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Create a menu category
      tags:
      - catalog
  /categories/{id}:
    delete:
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Delete a menu category (must be empty)
      tags:
      - catalog
    put:
      consumes:
      - application/json
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: string
      - description: Category
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.CategoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Update a menu category
      tags:
      - catalog
  /coupons:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: List coupons
      tags:
      - promos
    post:
      consumes:
      - application/json
      parameters:
      - description: Coupon
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.CouponRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Create a coupon
      tags:
      - promos
  /coupons/{id}:
    delete:
      parameters:
      - description: Coupon ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Delete a coupon
      tags:
      - promos
    put:
      consumes:
      - application/json
      parameters:
      - description: Coupon ID
        in: path
        name: id
        required: true
        type: string
      - description: Coupon
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.CouponRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Update a coupon
      tags:
      - promos
  /coupons/validate:
    post:
      consumes:
      - application/json
      parameters:
      - description: Code and subtotal
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.ValidateCouponRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Validate a coupon code against a subtotal (no redemption)
      tags:
      - promos
  /discounts:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: List discounts
      tags:
      - promos
    post:
      consumes:
      - application/json
      parameters:
      - description: Discount
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.DiscountRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Create a discount
      tags:
      - promos
  /discounts/{id}:
    delete:
      parameters:
      - description: Discount ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Delete a discount
      tags:
      - promos
    put:
      consumes:
      - application/json
      parameters:
      - description: Discount ID
        in: path
        name: id
        required: true
        type: string
      - description: Discount
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.DiscountRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Update a discount
      tags:
      - promos
  /health:
    get:
      description: Reports API liveness and dependency status (PostgreSQL, Redis,
